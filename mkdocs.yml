site_name: Commune Documentation
site_description: Documentation for the Commune framework
repo_url: https://github.com/commune-ai/commune
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Wiki:
    - Home: wiki/00-Home.md
    - Installation: wiki/01-Installation.md
    - Quick Start: wiki/02-Quick-Start.md
    - Core Concepts:
      - Module System: wiki/10-Module-System.md
      - Network Architecture: wiki/11-Network-Architecture.md
      - Blockchain Integration: wiki/12-Blockchain-Integration.md
    - Tutorials:
      - Basic Module: wiki/20-Tutorial-Basic-Module.md
      - Custom Validator: wiki/21-Tutorial-Custom-Validator.md
      - Network Deployment: wiki/22-Network-Deployment.md
      - Security Best Practices: wiki/23-Security-Best-Practices.md
  - Getting Started:
    - Introduction: 0_intro.md
    - Installation: 1_install.md
    - Tips: 2_tips.md
  - Core:
    - CLI: core/cli.md
    - Key: core/key.md
    - Module: core/module.md
    - Network: core/network.md
    - Server: core/server.md
    - Validator: core/vali.md
  - API Reference:
