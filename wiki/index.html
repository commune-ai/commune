<!DOCTYPE html>
<html data-theme="light">
<head>
    <title>Commune Documentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" id="light-theme">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="dark-theme" disabled>
    <style>
        :root[data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #24292e;
            --sidebar-bg: #f6f8fa;
            --link-color: #0366d6;
            --border-color: #e1e4e8;
            --code-bg: #f6f8fa;
            --blockquote-color: #6a737d;
            --header-border: #eaecef;
            --shadow-color: rgba(0,0,0,0.12);
        }
        
        :root[data-theme="dark"] {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --sidebar-bg: #161b22;
            --link-color: #58a6ff;
            --border-color: #30363d;
            --code-bg: #1f2428;
            --blockquote-color: #8b949e;
            --header-border: #21262d;
            --shadow-color: rgba(0,0,0,0.3);
        }

        body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 45px;
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .container {
            display: flex;
            gap: 3rem;
            margin-top: 2rem;
            padding-left: 280px;
        }

        .sidebar {
            width: 260px;
            position: fixed;
            left: 45px;
            background-color: var(--sidebar-bg);
            padding: 1.5rem;
            border-radius: 6px;
            box-shadow: 0 1px 3px var(--shadow-color);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            z-index: 10;
        }

        .content {
            position: relative;
            flex-grow: 1;
            padding-right: 2rem;
            width: 100%;
            max-width: 980px;
            margin: 0 auto;
            z-index: 1;
        }

        .markdown-body {
            position: relative;
            padding: 2rem;
            background-color: var(--bg-color);
            border-radius: 6px;
            box-shadow: 0 1px 3px var(--shadow-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            z-index: 1;
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .markdown-body pre {
            background-color: var(--code-bg) !important;
            border-radius: 6px;
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            color: var(--text-color);
        }

        .markdown-body code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: var(--code-bg);
            border-radius: 6px;
            font-family: ui-monospace,SFMono-Regular,SF Mono,Menlo,Consolas,Liberation Mono,monospace;
        }

        .nav-link {
            display: block;
            padding: 8px 12px;
            color: var(--link-color);
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .nav-link:hover {
            background-color: var(--code-bg);
        }

        .nav-link.active {
            background-color: var(--code-bg);
            font-weight: 600;
        }

        h2 {
            margin-top: 2rem;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--header-border);
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 8px 16px;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
        }

        .theme-toggle:hover {
            background-color: var(--code-bg);
        }

        /* Dark mode overrides for markdown content */
        [data-theme="dark"] .markdown-body {
            color: var(--text-color);
            background-color: var(--bg-color);
        }

        [data-theme="dark"] .markdown-body h1,
        [data-theme="dark"] .markdown-body h2,
        [data-theme="dark"] .markdown-body h3,
        [data-theme="dark"] .markdown-body h4,
        [data-theme="dark"] .markdown-body h5,
        [data-theme="dark"] .markdown-body h6 {
            color: var(--text-color);
            border-bottom-color: var(--border-color);
        }

        [data-theme="dark"] .markdown-body a {
            color: var(--link-color);
        }

        [data-theme="dark"] .markdown-body pre {
            background-color: var(--code-bg) !important;
        }

        [data-theme="dark"] .markdown-body code {
            background-color: var(--code-bg);
            color: var(--text-color);
        }

        [data-theme="dark"] .markdown-body blockquote {
            color: var(--blockquote-color);
            border-left-color: var(--border-color);
        }

        [data-theme="dark"] .markdown-body table th,
        [data-theme="dark"] .markdown-body table td {
            border-color: var(--border-color);
        }

        [data-theme="dark"] .markdown-body hr {
            background-color: var(--border-color);
        }

        @media (max-width: 767px) {
            .container {
                flex-direction: column;
                padding-left: 0;
            }
            .sidebar {
                position: static;
                width: 100%;
                margin-bottom: 2rem;
            }
            .content {
                margin-left: 0;
                padding-right: 0;
            }
            body {
                padding: 15px;
            }
            .theme-toggle {
                position: static;
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eclipse"><circle cx="12" cy="12" r="10"/><path d="M12 2a7 7 0 1 0 10 10"/></svg>
    </button>
    <div class="container">
        <div class="sidebar">
            <h2>Documentation</h2>
            <nav id="nav"></nav>
        </div>
        <div class="content">
            <div id="content" class="markdown-body"></div>
        </div>
    </div>
    <script>
        const pages = [
            { title: 'Home', path: '00-Home.md' },
            { title: 'Installation', path: '01-Installation.md' },
            { title: 'Quick Start', path: '02-Quick-Start.md' },
            { title: 'Module System', path: '10-Module-System.md' },
            { title: 'Network Architecture', path: '11-Network-Architecture.md' },
            { title: 'Blockchain Integration', path: '12-Blockchain-Integration.md' },
            { title: 'Basic Module Tutorial', path: '20-Tutorial-Basic-Module.md' },
            { title: 'Custom Validator Tutorial', path: '21-Tutorial-Custom-Validator.md' },
            { title: 'Network Deployment', path: '22-Network-Deployment.md' },
            { title: 'Security Best Practices', path: '23-Security-Best-Practices.md' }
        ];

        // Configure marked options
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-',
            gfm: true,
            breaks: true
        });

        // Build navigation
        const nav = document.getElementById('nav');
        pages.forEach(page => {
            const link = document.createElement('a');
            link.href = '#' + page.path;
            link.textContent = page.title;
            link.className = 'nav-link';
            nav.appendChild(link);
        });

        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Toggle syntax highlighting themes
            document.getElementById('light-theme').disabled = newTheme === 'dark';
            document.getElementById('dark-theme').disabled = newTheme === 'light';
            
            // Reapply syntax highlighting
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightBlock(block);
            });
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('light-theme').disabled = savedTheme === 'dark';
        document.getElementById('dark-theme').disabled = savedTheme === 'light';

        // Handle navigation
        async function loadContent(path) {
            try {
                const response = await fetch(path);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const text = await response.text();
                const content = document.getElementById('content');
                content.innerHTML = marked.parse(text);

                // Update active link
                document.querySelectorAll('.nav-link').forEach(link => {
                    if (link.getAttribute('href') === '#' + path) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });

                // Apply syntax highlighting to code blocks
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightBlock(block);
                });

                // Scroll to top
                window.scrollTo(0, 0);
            } catch (error) {
                console.error('Error loading content:', error);
                const content = document.getElementById('content');
                content.innerHTML = `<h1>Error</h1><p>Failed to load content: ${error.message}</p>`;
            }
        }

        // Handle hash changes
        function handleHash() {
            const hash = window.location.hash.slice(1) || '00-Home.md';
            loadContent(hash);
        }

        window.addEventListener('hashchange', handleHash);
        handleHash(); // Load initial content
    </script>
</body>
</html>
